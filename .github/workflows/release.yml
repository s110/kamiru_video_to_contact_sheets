# Construye los ejecutables de Kamiru Studio (Windows / macOS / Linux) con
# PyInstaller y publica un Release de GitHub cada vez que se empuja un tag
# "v*" (p. ej. v2.1.0). También se puede lanzar a mano (workflow_dispatch).

name: Release

on:
  push:
    tags: ["v*"]
    # Crear una rama "release/vX.Y.Z" también publica el release vX.Y.Z
    # (útil desde entornos que no pueden empujar tags por git).
    branches: ["release/**"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag del release (p. ej. v2.1.0); vacío = solo construir"
        required: false
        default: ""

# Permiso MÍNIMO por defecto: solo el job que publica el release necesita
# escribir en el repositorio; los de construcción no.
permissions:
  contents: read

env:
  PYTHONUTF8: "1"   # consola UTF-8 también en Windows (emojis del test/log)
  # uv debe usar el Python de setup-python, NO descargarse uno propio: la
  # ventana es Tkinter y un intérprete sin Tk produce ejecutables que abren
  # en blanco. El de setup-python lo trae garantizado.
  UV_PYTHON_PREFERENCE: only-system

jobs:
  build:
    name: Build (${{ matrix.nombre }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            nombre: windows
          - os: macos-latest        # Apple Silicon (M1-M4)
            nombre: macos-apple-silicon
          - os: ubuntu-22.04
            nombre: linux
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.8.17"
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias (exactamente las de uv.lock)
        shell: bash
        # --frozen falla si uv.lock no coincide con pyproject.toml, así que el
        # ejecutable publicado se construye SIEMPRE con versiones revisadas.
        # La variante headless de OpenCV pesa menos y evita conflictos de
        # librerías gráficas dentro del ejecutable (la ventana es Tkinter).
        run: uv sync --frozen --extra headless --group build

      - name: Prueba de integración (sin GUI)
        shell: bash
        run: uv run --frozen --extra headless python tests/test_pipeline.py

      - name: Construir con PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          uv run --frozen --extra headless --group build \
            pyinstaller --noconfirm --clean --windowed --name Kamiru-Studio \
            --icon assets/icon.ico \
            --collect-all imageio_ffmpeg \
            main.py

      - name: Construir con PyInstaller (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          uv run --frozen --extra headless --group build \
            pyinstaller --noconfirm --clean --windowed --name Kamiru-Studio \
            --collect-all imageio_ffmpeg \
            main.py

      - name: Empaquetar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/Kamiru-Studio -DestinationPath Kamiru-Studio-windows.zip

      - name: Empaquetar (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist
          # ditto conserva los atributos que necesita el .app
          ditto -c -k --keepParent "Kamiru-Studio.app" \
            "../Kamiru-Studio-${{ matrix.nombre }}.zip"

      - name: Empaquetar (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: tar -C dist -czf Kamiru-Studio-linux.tar.gz Kamiru-Studio

      - uses: actions/upload-artifact@v4
        with:
          name: Kamiru-Studio-${{ matrix.nombre }}
          path: |
            Kamiru-Studio-*.zip
            Kamiru-Studio-*.tar.gz
          if-no-files-found: error

  release:
    name: Publicar Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # crear el tag y publicar los binarios
    # Se publica al empujar un tag v*, una rama release/vX.Y.Z, o al lanzarlo
    # a mano indicando el tag (la action crea el tag si no existe).
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      startsWith(github.ref_name, 'release/') ||
      inputs.tag != ''
    steps:
      - name: Determinar el tag
        id: tag
        shell: bash
        # Los valores se pasan por 'env' (no interpolados en el script) para
        # evitar inyección de comandos si un nombre de rama/tag contiene
        # metacaracteres de shell como $( ), backticks o ';'.
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="$INPUT_TAG"
          REF="$REF_NAME"
          if [ -z "$TAG" ]; then
            case "$REF" in
              release/*) TAG="${REF#release/}" ;;
              *)         TAG="$REF" ;;
            esac
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artefactos
          merge-multiple: true

      # Fijado al SHA del commit (no al tag móvil @v2) para que un compromiso
      # de la cuenta/repo de la acción no pueda inyectar código en el release.
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: artefactos/*
          generate_release_notes: true
          body: |
            ## Kamiru Studio — ejecutables listos para usar 💚☀️

            Descarga el archivo de tu sistema, descomprímelo y ábrelo.
            **No hace falta instalar Python ni nada más.**

            | Sistema | Archivo |
            |---|---|
            | Windows | `Kamiru-Studio-windows.zip` → descomprime y abre `Kamiru-Studio.exe` |
            | macOS con chip Apple (M1–M4) | `Kamiru-Studio-macos-apple-silicon.zip` → descomprime y abre `Kamiru-Studio.app` |
            | Linux | `Kamiru-Studio-linux.tar.gz` → descomprime y ejecuta `Kamiru-Studio/Kamiru-Studio` |

            > **macOS:** la primera vez, clic derecho sobre la app → **Abrir** → **Abrir**
            > (es una app sin firmar). Si macOS la bloquea igualmente:
            > `xattr -dr com.apple.quarantine "Kamiru-Studio.app"` en la Terminal.
            >
            > **Windows:** si SmartScreen avisa, pulsa «Más información» → «Ejecutar de todas formas».

            La guía completa de uso está en [`MANUAL.md`](https://github.com/${{ github.repository }}/blob/${{ steps.tag.outputs.tag }}/MANUAL.md).
